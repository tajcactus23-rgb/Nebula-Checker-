<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb000;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="#050510"/>
  <circle cx="200" cy="200" r="150" fill="none" stroke="url(#glow)" stroke-width="3">
    <animate attributeName="r" values="140;160;140" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#00f0ff" stroke-width="2">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <polygon points="200,80 220,160 280,160 230,210 250,280 200,230 150,280 170,210 120,160 180,160" fill="none" stroke="url(#glow)" stroke-width="2">
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="20s" repeatCount="indefinite"/>
  </polygon>
  <text x="200" y="210" text-anchor="middle" fill="#00f0ff" font-family="monospace" font-size="48" font-weight="bold">◈</text>
  <text x="200" y="350" text-anchor="middle" fill="#00f0ff" font-family="monospace" font-size="24">NEBULA</text>
</svg>
