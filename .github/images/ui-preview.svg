<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#050510"/>
  <rect x="20" y="20" width="760" height="80" fill="none" stroke="#00f0ff" stroke-width="2" rx="5"/>
  <text x="40" y="60" fill="#00f0ff" font-family="monospace" font-size="28">NEBULA // CHECKER</text>
  <text x="680" y="60" fill="#00f0ff" font-family="monospace" font-size="16">ONLINE</text>
  <circle cx="720" cy="50" r="8" fill="#00ff00">
    <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  <rect x="20" y="120" width="370" height="220" fill="none" stroke="#00f0ff" stroke-width="1" rx="3"/>
  <text x="35" y="150" fill="#00f0ff" font-family="monospace" font-size="14">◈ NEURAL NETWORK // REALTIME</text>
  <g fill="#00f0ff" opacity="0.5">
    <circle cx="100" cy="200" r="4"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="180" r="4"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="220" r="4"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="190" r="4"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="210" r="4"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.6s" repeatCount="indefinite"/></circle>
  </g>
  <line x1="100" y1="200" x2="150" y2="180" stroke="#00f0ff" stroke-width="1" opacity="0.3"/>
  <line x1="150" y1="180" x2="200" y2="220" stroke="#00f0ff" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="220" x2="250" y2="190" stroke="#00f0ff" stroke-width="1" opacity="0.3"/>
  <line x1="250" y1="190" x2="300" y2="210" stroke="#00f0ff" stroke-width="1" opacity="0.3"/>
  <rect x="410" y="120" width="370" height="220" fill="none" stroke="#00f0ff" stroke-width="1" rx="3"/>
  <text x="425" y="150" fill="#00f0ff" font-family="monospace" font-size="14">◈ VALIDATED TOKENS</text>
  <rect x="20" y="360" width="760" height="100" fill="none" stroke="#00f0ff" stroke-width="1" rx="3"/>
  <text x="35" y="390" fill="#00f0ff" font-family="monospace" font-size="14">◈ DATA INPUT</text>
  <rect x="35" y="410" width="400" height="35" fill="#0a0a15" stroke="#00f0ff" stroke-width="1" rx="3"/>
  <text x="50" y="435" fill="#666" font-family="monospace" font-size="12">email:password</text>
  <rect x="450" y="410" width="100" height="35" fill="none" stroke="#00f0ff" stroke-width="1" rx="20"/>
  <text x="475" y="435" fill="#00f0ff" font-family="monospace" font-size="14">THREADS</text>
  <circle cx="730" cy="427" r="12" fill="none" stroke="#00f0ff" stroke-width="2"/>
  <text x="730" y="430" fill="#00f0ff" font-family="monospace" font-size="10" text-anchor="middle">10</text>
  <rect x="35" y="475" width="150" height="35" fill="none" stroke="#00f0ff" stroke-width="2" rx="3"/>
  <text x="85" y="500" fill="#00f0ff" font-family="monospace" font-size="14" text-anchor="middle">INITIATE</text>
  <rect x="200" y="475" width="150" height="35" fill="none" stroke="#ffb000" stroke-width="2" rx="3"/>
  <text x="240" y="500" fill="#ffb000" font-family="monospace" font-size="14" text-anchor="middle">PASTE</text>
  <rect x="600" y="475" width="180" height="35" fill="none" stroke="#00f0ff" stroke-width="2" rx="3"/>
  <text x="650" y="500" fill="#00f0ff" font-family="monospace" font-size="14" text-anchor="middle">PROXY ROTATION</text>
  <rect x="20" y="480" width="760" height="100" fill="none" stroke="#00f0ff" stroke-width="1" rx="3"/>
  <text x="35" y="510" fill="#00f0ff" font-family="monospace" font-size="14">◈ MISSION STATS</text>
  <text x="35" y="550" fill="#00f0ff" font-family="monospace" font-size="20">0 TOTAL</text>
  <text x="200" y="550" fill="#00ff00" font-family="monospace" font-size="20">0 HITS</text>
  <text x="350" y="550" fill="#ff0000" font-family="monospace" font-size="20">0% RATE</text>
  <text x="500" y="550" fill="#00f0ff" font-family="monospace" font-size="20">0% PROGRESS</text>
</svg>
