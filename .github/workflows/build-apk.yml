name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Prepare Android files
      run: |
        mkdir -p app/src/main/assets
        cp android/checker.html app/src/main/assets/
        cp android/checker.html app/src/main/index.html
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Install Android SDK
      run: |
        export ANDROID_HOME=$RUNNER_DIR/android-sdk
        mkdir -p $ANDROID_HOME/cmdline-tools
        cd /tmp
        curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline.zip
        unzip -q cmdline.zip
        mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null 2>&1 || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" >/dev/null 2>&1
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
    
    - name: Create Android Project
      run: |
        export ANDROID_HOME=$RUNNER_DIR/android-sdk
        
        mkdir -p app/src/main/java/com/nebulachecker
        cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.nebulachecker">
            <uses-permission android:name="android.permission.INTERNET"/>
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
            <application
                android:allowBackup="true"
                android:label="Nebula Checker"
                android:supportsRtl="true"
                android:theme="@android:style/Theme.Material.NoActionBar">
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:configChanges="orientation|screenSize|keyboardHidden">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        MANIFEST
        
        cat > app/build.gradle << 'GRADLE'
        plugins {
            id 'com.android.application'
        }
        
        android {
            namespace 'com.nebulachecker'
            compileSdk 34
            defaultConfig {
                applicationId "com.nebulachecker"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
        }
        
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
        }
        GRADLE
        
        # Create source file
        cat > app/src/main/java/com/nebulachecker/MainActivity.java << 'JAVA'
        package com.nebulachecker;
        import android.os.Bundle;
        import android.webkit.WebView;
        import android.webkit.WebSettings;
        import androidx.appcompat.app.AppCompatActivity;
        
        public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                WebView webView = new WebView(this);
                setContentView(webView);
                WebSettings settings = webView.getSettings();
                settings.setJavaScriptEnabled(true);
                settings.setDomStorageEnabled(true);
                settings.setDatabaseEnabled(true);
                settings.setCacheMode(WebSettings.LOAD_NO_CACHE);
                webView.loadUrl("file:///android_asset/index.html");
            }
        }
        JAVA
        
        cat > local.properties << PROPS
        sdk.dir=$ANDROID_HOME
        PROPS
        
        cat > gradle.properties << PROPS
        org.gradle.jvmargs=-Xmx2048m -Xmx2048m
        android.useAndroidX=true
        android.enableJetifier=true
        PROPS
        
        mkdir -p gradle/wrapper
        
        cat > gradle/wrapper/gradle-wrapper.properties << PROPS
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
        PROPS
    
    - name: Create Gradle Wrapper
      run: |
        cd /tmp
        curl -sL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o gradle.zip
        unzip -q gradle.zip
        /tmp/gradle-8.4/bin/gradle wrapper --gradle-version 8.4 -p /tmp/nebula_checker/app 2>/dev/null || true
        cp -r /tmp/gradle-8.4/lib/plugins/gradle*.jar app/gradle/wrapper/ 2>/dev/null || true
    
    - name: Download Gradle
      run: |
        cd /tmp/nebula_checker/app
        curl -sL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o gradle.zip
        unzip -q gradle.zip
        export PATH=$PATH:/tmp/gradle-8.4/bin
        echo "PATH=$PATH" >> $GITHUB_ENV
    
    - name: Build Debug APK
      run: |
        export ANDROID_HOME=$RUNNER_DIR/android-sdk
        
        cd /tmp/nebula_checker/app
        
        # Use gradle wrapper
        if [ -f "gradlew" ]; then
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -20
        else
          # Direct gradle
          /tmp/gradle-8.4/bin/gradle assembleDebug --no-daemon 2>&1 | tail -20
        fi
        
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Checking build..."
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: nebula-checker-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7
      continue-on-error: true
    
    - name: Fallback Package
      if: failure()
      run: |
        mkdir -p release
        cp android/checker.html release/
        cd release
        zip -r ../nebula-checker-android.zip *
        cd ..
    
    - name: Upload Fallback
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: nebula-checker-android
        path: nebula-checker-android.zip
        retention-days: 30
