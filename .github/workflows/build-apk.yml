name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Prepare Android files
      run: |
        mkdir -p app/src/main/assets
        cp android/checker.html app/src/main/assets/index.html
        mkdir -p release
        cp android/checker.html release/
        cd release && zip -r ../nebula-checker-android.zip * && cd ..
        echo "APK build requires local Gradle - see artifact for standalone"
    
    - name: Upload Package
      uses: actions/upload-artifact@v4
      with:
        name: nebula-checker-android
        path: nebula-checker-android.zip
        retention-days: 30
