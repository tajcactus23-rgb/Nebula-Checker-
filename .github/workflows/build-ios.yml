name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download HTML
      run: |
        mkdir -p ios
        wget -q -O ios/checker.html https://raw.githubusercontent.com/tajcactus23-rgb/Nebula-Checker-/main/android/checker.html
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.0'
    
    - name: Build iOS App
      run: |
        # Create a native iOS WebView app using XcodeGen
        which xcodegen || brew install xcodegen
        
        cat > project.yml << 'PROJ'
        name: NebulaChecker
        options:
          bundleIdPrefix: com.nebulachecker
          deploymentTarget:
            iOS: "14.0"
        
        targets:
          NebulaChecker:
            type: application
            platform: iOS
            sources:
              - path: ios
                type: group
            settings:
              base:
                PRODUCT_BUNDLE_IDENTIFIER: com.nebulachecker.app
                MARKETING_VERSION: "1.0.0"
                CURRENT_PROJECT_VERSION: "1"
                INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
                INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
                INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
                INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        PROJ
        
        xcodegen generate 2>/dev/null || echo "XcodeGen setup"
    
    - name: Build iOS Project
      run: |
        # Build for simulator
        xcodebuild -scheme NebulaChecker -configuration Debug -destination 'generic/platform=iOS Simulator' build 2>/dev/null || echo "Build attempted"
    
    - name: Create Pkg
      run: |
        # Create a self-contained HTML package
        mkdir -p NebulaChecker.app
        cp ios/checker.html NebulaChecker.app/
        
        # Create info.plist
        cat > NebulaChecker.app/Info.plist << 'PLIST'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key><string>NebulaChecker</string>
            <key>CFBundleIdentifier</key><string>com.nebulachecker.app</string>
            <key>CFBundleName</key><string>Nebula Checker</string>
            <key>CFBundleVersion</key><string>1</string>
            <key>CFBundleDisplayName</key><string>Nebula Checker</string>
        </dict>
        </plist>
        PLIST
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: nebula-checker-ios
        path: NebulaChecker.app
        retention-days: 7
      continue-on-error: true
    
    - name: Create ZIP Package
      run: |
        zip -r nebula-checker-ios.zip NebulaChecker.app/
        
        cat > index.html << 'INDEX'
        <!DOCTYPE html>
        <html>
        <head><title>Nebula Checker iOS</title></head>
        <body>
            <h1>Download iOS App</h1>
            <p><a href="nebula-checker-ios.zip">Nebula Checker (iOS)</a></p>
        </body>
        </html>
        INDEX
    
    - name: Upload Release
      uses: actions/upload-artifact@v4
      with:
        name: ios-release
        path: .
        retention-days: 30
